# Service explicitly specifying subnets — replaces auto-discovery
apiVersion: v1
kind: Service
metadata:
  name: subnet-api
  namespace: default
  annotations:
    nlb.k8s.aws/enabled: "true"
    nlb.k8s.aws/shared-nlb-name: "subnet-group"
    nlb.k8s.aws/scheme: "internal"
    nlb.k8s.aws/target-type: "ip"
    nlb.k8s.aws/subnets: "subnet-xxxxxxxxx,subnet-yyyyyyyyy"
spec:
  type: ClusterIP
  selector:
    app: subnet-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subnet-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subnet-api
  template:
    metadata:
      labels:
        app: subnet-api
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 8080

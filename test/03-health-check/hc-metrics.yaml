# Service using TCP health check (default)
apiVersion: v1
kind: Service
metadata:
  name: hc-metrics
  namespace: default
  annotations:
    nlb.k8s.aws/enabled: "true"
    nlb.k8s.aws/shared-nlb-name: "hc-group"
    nlb.k8s.aws/scheme: "internal"
    nlb.k8s.aws/target-type: "ip"
    nlb.k8s.aws/healthcheck-protocol: "TCP"
    nlb.k8s.aws/healthcheck-port: "9090"
    nlb.k8s.aws/healthcheck-interval: "10"
    nlb.k8s.aws/healthcheck-healthy-threshold: "3"
spec:
  type: ClusterIP
  selector:
    app: hc-metrics
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hc-metrics
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hc-metrics
  template:
    metadata:
      labels:
        app: hc-metrics
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 9090

# Service 2 — worker endpoint, shares the same NLB "payments"
apiVersion: v1
kind: Service
metadata:
  name: demo-worker
  namespace: default
  annotations:
    nlb.k8s.aws/enabled: "true"
    nlb.k8s.aws/shared-nlb-name: "payments"
    nlb.k8s.aws/scheme: "internal"
    nlb.k8s.aws/target-type: "ip"
spec:
  type: ClusterIP
  selector:
    app: demo-worker
  ports:
    - name: http
      port: 81
      targetPort: 8081
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-worker
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-worker
  template:
    metadata:
      labels:
        app: demo-worker
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 8081

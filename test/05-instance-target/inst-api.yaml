# Service using instance target type (registers NodePort on worker nodes)
apiVersion: v1
kind: Service
metadata:
  name: inst-api
  namespace: default
  annotations:
    nlb.k8s.aws/enabled: "true"
    nlb.k8s.aws/shared-nlb-name: "inst-group"
    nlb.k8s.aws/scheme: "internal"
    nlb.k8s.aws/target-type: "instance"
    nlb.k8s.aws/healthcheck-protocol: "TCP"
    nlb.k8s.aws/healthcheck-port: "traffic-port"
spec:
  type: ClusterIP
  selector:
    app: inst-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inst-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inst-api
  template:
    metadata:
      labels:
        app: inst-api
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 8080
